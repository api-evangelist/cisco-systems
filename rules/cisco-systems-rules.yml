extends:
  - spectral:oas
rules:
  cisco-info-contact:
    description: API info MUST contain a contact email or URL.
    severity: warn
    given: $.info
    then:
      field: contact
      function: truthy
  cisco-https-only:
    description: All Cisco Systems API servers MUST use HTTPS.
    severity: error
    given: $.servers[*].url
    then:
      function: pattern
      functionOptions:
        match: '^https://'
  cisco-operation-id:
    description: Operations MUST have an operationId.
    severity: error
    given: $.paths[*][get,post,put,delete,patch]
    then:
      field: operationId
      function: truthy
  cisco-tag-required:
    description: Operations MUST be tagged for product domain grouping.
    severity: warn
    given: $.paths[*][get,post,put,delete,patch].tags
    then:
      function: truthy
  cisco-security-required:
    description: API MUST define security schemes.
    severity: error
    given: $.components.securitySchemes
    then:
      function: truthy
  cisco-server-url:
    description: API MUST declare at least one server URL.
    severity: error
    given: $.servers
    then:
      function: truthy
