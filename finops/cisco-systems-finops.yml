alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Cisco Systems
serviceCategory: Networking + Security
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Cisco Systems
  ServiceCategory: Networking + Security
  ProviderName: Cisco Systems
  PublisherName: Cisco Systems
  BillingCurrency: USD
meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - instance_type
      - tenant
  - name: storage
    unit: GB-month
    aggregation: max
    dimensions:
      - service
      - tier
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - egress_type
      - region_pair
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - service
      - operation
  - name: managed_services
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Track Cisco Systems consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers for chargeback.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
