naftiko: 1.0.0-alpha2
info:
  label: Cisco DevNet API — Networking
  description: 'Cisco DevNet API — Networking. 1 operations. Lead operation: Get API status. Self-contained Naftiko capability
    covering one Cisco Systems business surface.'
  tags:
  - Cisco Systems
  - Networking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_SYSTEMS_API_KEY: CISCO_SYSTEMS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cisco-networking
    baseUri: https://developer.cisco.com/api
    description: Cisco DevNet API — Networking business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CISCO_SYSTEMS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cisco-networking-rest
    port: 8080
    description: REST adapter for Cisco DevNet API — Networking. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: cisco-networking.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cisco-networking-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco DevNet API — Networking. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-api-status
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cisco-networking.getstatus
      outputParameters:
      - type: object
        mapping: $.
